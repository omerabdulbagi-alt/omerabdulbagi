name: Build Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          fetch-depth: 0

      - name: Verify release source
        id: source
        shell: bash
        run: |
          echo "Building main commit: $(git rev-parse HEAD)"
          git log -1 --oneline
          grep '^version:' pubspec.yaml
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee build-release.log

      - name: Report release build failure
        if: failure()
        shell: bash
        run: |
          message="$(tail -n 20 build-release.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
          echo "::error title=Android release build failed::$message"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: contentflow-v3-app-release-${{ steps.source.outputs.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
